/* ===== GLOBAL ===== */
body{

    text-align:center;

}

/* ===== MAIN BOX ===== */
.main-box{
    background:rgba(255,255,255,0.08);
    padding:25px 35px;
    border-radius:15px;
    max-width:1100px;
    margin:auto;

    box-shadow:

        0 0 35px rgba(106,13,173,0.6);
}

/* ===== TITLE ===== */
h1{
    font-weight:700;
}

/* ===== SEARCH ===== */
#searchBox{
    padding:10px;
    width:90%;
    max-width:300px;
    border-radius:6px;
    border:none;
    margin-bottom:20px;
}

/* ===== TABLE ===== */
.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.9);
    color:#222;
    border-radius:10px;
    overflow:hidden;
}

thead{
    background:#6a0dad;
    color:white;
}

th,td{
    padding:12px;
    text-align:left;
}

tbody tr{
    transition:0.25s;
}

tbody tr:nth-child(even){
    background:#f5f0ff;
}

tbody tr:hover{
    background:#e6d9ff;
    transform:scale(1.01);
}

/* ===== BUTTON ===== */
.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#6a0dad;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    box-shadow:0 6px #4b0082;
}

.btn:hover{
    background:#7d27c1;
    transform:scale(1.05);
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    .main-box{
        padding:20px;
    }
}

</style>
</head>

/* ===== SEARCH TABLE ===== */
document.getElementById("searchBox").addEventListener("input", function(){

 let filter = this.value.toLowerCase();
 let rows = document.querySelectorAll("#stokBody tr");

 rows.forEach(row=>{
     let text = row.textContent.toLowerCase();
     row.style.display = text.includes(filter) ? "" : "none";
 });

});
